name: Auto-Merge External Contributors

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'EXTERNAL_CONTRIBUTORS.md'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # IMPORTANT: Replace 'memanto-bot' with the exact GitHub username of the account
    # or GitHub App generating the PRs via the Next.js API route.
    if: github.actor == 'memanto-bot'
    permissions:
      pull-requests: write
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify PR only touches EXTERNAL_CONTRIBUTORS.md
        id: verify-diff
        run: |
          # Get list of changed files
          CHANGED_FILES=$(gh pr view ${{ github.event.pull_request.number }} --json files --jq '.files[].path')
          
          if [ "$CHANGED_FILES" != "EXTERNAL_CONTRIBUTORS.md" ]; then
            echo "Error: PR modifies files other than EXTERNAL_CONTRIBUTORS.md"
            echo "Changed files: $CHANGED_FILES"
            exit 1
          fi

          # Optional but recommended security: Verify it only *added* a single line
          gh pr diff ${{ github.event.pull_request.number }} > pr.diff
          
          # Count lines starting with '+' that aren't diff headers (+++)
          ADDED_LINES=$(grep '^+[^+]' pr.diff | wc -l)
          REMOVED_LINES=$(grep '^-[^-]' pr.diff | wc -l)
          
          if [ "$ADDED_LINES" -ne 1 ] || [ "$REMOVED_LINES" -ne 0 ]; then
            echo "Error: PR must exactly add 1 line and remove 0 lines."
            exit 1
          fi
          
          echo "Verification passed!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve Pull Request
        run: gh pr review --approve "${{ github.event.pull_request.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge Pull Request
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --admin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
